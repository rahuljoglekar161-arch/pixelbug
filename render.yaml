services:
  - type: web
    name: pixelbug-calendar
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: pixelbug-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PIXELBUG_COOKIE_SECURE
        value: "true"
      - key: PIXELBUG_BASE_URL
        sync: https://pixelbug-calendar.onrender.com
      - key: RESEND_API_KEY
        sync: re_aNcN5D9s_LyDB24zKCwaZBhUAd69xuq4S
      - key: PIXELBUG_EMAIL_FROM
        sync: false
